<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Terminal Screenshots</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; background: #f5f7fb; }
    h1 { margin-bottom: 20px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 16px; }
    .card { background: #fff; border: 1px solid #d9e0ea; border-radius: 8px; padding: 12px; }
    .card h2 { font-size: 16px; margin: 0 0 10px; }
    .card img { width: 100%; height: auto; border: 1px solid #e5eaf1; border-radius: 6px; }
  </style>
</head>
<body>
  <h1>Create Terminal Screenshots</h1>
  <div class="grid">
    <div class="card">
      <h2>Terminal Name</h2>
      <img src="./terminal-name.png" alt="Terminal name screenshot" />
    </div>
    <div class="card">
      <h2>Address</h2>
      <img src="./address.png" alt="Address screenshot" />
    </div>
    <div class="card">
      <h2>Email</h2>
      <img src="./email.png" alt="Email screenshot" />
    </div>
    <div class="card">
      <h2>Password</h2>
      <img src="./password.png" alt="Password screenshot" />
    </div>
  </div>
</body>
</html>
